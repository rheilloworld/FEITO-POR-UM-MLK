<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Portal - Unrestricted Access</title>
    <meta name="description" content="Educational proxy for unrestricted web access">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3498db;
            --primary-dark: #2980b9;
            --secondary: #2c3e50;
            --accent: #e74c3c;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --text-light: #ecf0f1;
            --text-dark: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 15px 30px;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            display: none;
        }

        .header.active {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo {
            font-size: 1.5em;
            font-weight: bold;
            color: var(--primary);
        }

        .url-bar {
            display: flex;
            gap: 10px;
            align-items: center;
            flex: 1;
            max-width: 600px;
        }

        .url-input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid var(--primary);
            border-radius: 25px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .url-input:focus {
            outline: none;
            border-color: var(--primary-dark);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .nav-btn {
            background: var(--secondary);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2em;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover {
            background: var(--primary);
            transform: scale(1.1);
        }

        .close-btn {
            background: var(--accent);
        }

        .close-btn:hover {
            background: #c0392b;
        }

        /* Welcome Screen */
        .welcome-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .welcome-box {
            background: rgba(255, 255, 255, 0.98);
            padding: 60px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 800px;
            width: 100%;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .welcome-box h1 {
            font-size: 3em;
            color: var(--text-dark);
            margin-bottom: 15px;
        }

        .welcome-box .subtitle {
            font-size: 1.2em;
            color: #7f8c8d;
            margin-bottom: 40px;
        }

        .search-section {
            margin: 40px 0;
        }

        .main-search {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .main-input {
            flex: 1;
            padding: 20px 25px;
            border: 3px solid var(--primary);
            border-radius: 15px;
            font-size: 1.2em;
            transition: all 0.3s ease;
        }

        .main-input:focus {
            outline: none;
            border-color: var(--primary-dark);
            box-shadow: 0 0 0 4px rgba(52, 152, 219, 0.15);
        }

        .main-btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            padding: 20px 50px;
            font-size: 1.3em;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(52, 152, 219, 0.3);
        }

        .main-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(52, 152, 219, 0.4);
        }

        .main-btn:active {
            transform: translateY(-1px);
        }

        /* Quick Links */
        .quick-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }

        .quick-link {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 1em;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .quick-link:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }

        .quick-link .icon {
            font-size: 2em;
        }

        .quick-link .label {
            font-weight: 600;
        }

        /* Features */
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 50px;
            padding-top: 30px;
            border-top: 2px solid #e0e0e0;
        }

        .feature {
            text-align: center;
            padding: 20px;
        }

        .feature-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }

        .feature-title {
            font-weight: bold;
            color: var(--text-dark);
            margin-bottom: 5px;
        }

        .feature-desc {
            font-size: 0.9em;
            color: #7f8c8d;
        }

        /* Proxy Frame */
        .proxy-container {
            display: none;
            flex: 1;
            width: 100%;
            position: relative;
        }

        .proxy-container.active {
            display: block;
        }

        .proxy-frame {
            width: 100%;
            height: calc(100vh - 70px);
            border: none;
            background: white;
        }

        /* Loading */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .loading.active {
            display: flex;
        }

        .loading-content {
            text-align: center;
            color: white;
        }

        .spinner {
            width: 70px;
            height: 70px;
            border: 8px solid rgba(255, 255, 255, 0.3);
            border-top: 8px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 1.5em;
            font-weight: bold;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .welcome-box {
                padding: 40px 30px;
            }

            .welcome-box h1 {
                font-size: 2em;
            }

            .main-search {
                flex-direction: column;
            }

            .quick-links {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <!-- Header (hidden initially) -->
    <div class="header" id="header">
        <div class="header-left">
            <div class="logo">📚 Study Portal</div>
            <button class="nav-btn" onclick="goBack()" title="Back">←</button>
            <button class="nav-btn" onclick="goForward()" title="Forward">→</button>
            <button class="nav-btn" onclick="reloadProxy()" title="Reload">⟳</button>
        </div>
        <div class="url-bar">
            <input type="text" class="url-input" id="headerUrlInput" placeholder="Enter URL..." />
            <button class="nav-btn" onclick="navigateFromHeader()">→</button>
        </div>
        <button class="nav-btn close-btn" onclick="closeProxy()" title="Close">✕</button>
    </div>

    <!-- Welcome Screen -->
    <div class="welcome-container" id="welcomeContainer">
        <div class="welcome-box">
            <h1>📚 Study Portal</h1>
            <p class="subtitle">Unrestricted access to educational resources</p>

            <div class="search-section">
                <div class="main-search">
                    <input 
                        type="text" 
                        class="main-input" 
                        id="mainUrlInput" 
                        placeholder="Enter URL or search term..."
                        autocomplete="off"
                    />
                    <button class="main-btn" onclick="navigate()">Go 🚀</button>
                </div>

                <div class="quick-links">
                    <button class="quick-link" onclick="quickNav('https://discord.com/app')">
                        <span class="icon">💬</span>
                        <span class="label">Discord</span>
                    </button>
                    <button class="quick-link" onclick="quickNav('https://discord.com/channels/@me')">
                        <span class="icon">📱</span>
                        <span class="label">Messages</span>
                    </button>
                    <button class="quick-link" onclick="quickNav('https://youtube.com')">
                        <span class="icon">📺</span>
                        <span class="label">YouTube</span>
                    </button>
                    <button class="quick-link" onclick="quickNav('https://reddit.com')">
                        <span class="icon">🔴</span>
                        <span class="label">Reddit</span>
                    </button>
                    <button class="quick-link" onclick="quickNav('https://twitter.com')">
                        <span class="icon">🐦</span>
                        <span class="label">Twitter</span>
                    </button>
                    <button class="quick-link" onclick="quickNav('https://instagram.com')">
                        <span class="icon">📷</span>
                        <span class="label">Instagram</span>
                    </button>
                </div>
            </div>

            <div class="features">
                <div class="feature">
                    <div class="feature-icon">🔒</div>
                    <div class="feature-title">Secure</div>
                    <div class="feature-desc">Encrypted connection</div>
                </div>
                <div class="feature">
                    <div class="feature-icon">⚡</div>
                    <div class="feature-title">Fast</div>
                    <div class="feature-desc">Optimized performance</div>
                </div>
                <div class="feature">
                    <div class="feature-icon">🌐</div>
                    <div class="feature-title">Universal</div>
                    <div class="feature-desc">Access any website</div>
                </div>
                <div class="feature">
                    <div class="feature-icon">🛡️</div>
                    <div class="feature-title">Private</div>
                    <div class="feature-desc">No tracking</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading" id="loading">
        <div class="loading-content">
            <div class="spinner"></div>
            <div class="loading-text">Loading...</div>
        </div>
    </div>

    <!-- Proxy Container -->
    <div class="proxy-container" id="proxyContainer">
        <iframe id="proxyFrame" class="proxy-frame"></iframe>
    </div>

    <!-- Ultraviolet Bundle -->
    <script src="/uv/uv.bundle.js"></script>
    <script src="/uv/uv.config.js"></script>

    <script>
        const welcomeContainer = document.getElementById('welcomeContainer');
        const proxyContainer = document.getElementById('proxyContainer');
        const proxyFrame = document.getElementById('proxyFrame');
        const header = document.getElementById('header');
        const loading = document.getElementById('loading');
        const mainUrlInput = document.getElementById('mainUrlInput');
        const headerUrlInput = document.getElementById('headerUrlInput');

        // Enter key support
        mainUrlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') navigate();
        });

        headerUrlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') navigateFromHeader();
        });

        function quickNav(url) {
            mainUrlInput.value = url;
            navigate();
        }

        async function navigate() {
            let url = mainUrlInput.value.trim();
            if (!url) return;

            // Add https if no protocol
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                if (url.includes('.')) {
                    url = 'https://' + url;
                } else {
                    url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
                }
            }

            loadProxy(url);
        }

        function navigateFromHeader() {
            let url = headerUrlInput.value.trim();
            if (!url) return;

            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                if (url.includes('.')) {
                    url = 'https://' + url;
                } else {
                    url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
                }
            }

            loadProxy(url);
        }

        async function loadProxy(url) {
            loading.classList.add('active');

            try {
                // Register service worker if not already registered
                if (!navigator.serviceWorker.controller) {
                    await navigator.serviceWorker.register('/uv/sw.js', {
                        scope: '/service/'
                    });
                    await navigator.serviceWorker.ready;
                }

                // Encode URL with Ultraviolet
                const encodedUrl = __uv$config.encodeUrl(url);
                const proxyUrl = '/service/' + encodedUrl;

                // Update frame
                proxyFrame.src = proxyUrl;

                // Update UI
                headerUrlInput.value = url;
                welcomeContainer.style.display = 'none';
                header.classList.add('active');
                proxyContainer.classList.add('active');

                // Hide loading after delay
                setTimeout(() => {
                    loading.classList.remove('active');
                }, 1500);

            } catch (error) {
                console.error('Proxy error:', error);
                alert('Failed to load. Please try again.');
                loading.classList.remove('active');
            }
        }

        function closeProxy() {
            proxyContainer.classList.remove('active');
            header.classList.remove('active');
            welcomeContainer.style.display = 'flex';
            proxyFrame.src = 'about:blank';
            mainUrlInput.value = '';
            headerUrlInput.value = '';
        }

        function reloadProxy() {
            if (proxyFrame.src && proxyFrame.src !== 'about:blank') {
                proxyFrame.src = proxyFrame.src;
            }
        }

        function goBack() {
            try {
                proxyFrame.contentWindow.history.back();
            } catch (e) {
                console.log('Cannot go back');
            }
        }

        function goForward() {
            try {
                proxyFrame.contentWindow.history.forward();
            } catch (e) {
                console.log('Cannot go forward');
            }
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && proxyContainer.classList.contains('active')) {
                closeProxy();
            }
        });
    </script>
</body>
</html>
